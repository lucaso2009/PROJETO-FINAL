<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin - Produtos</title><link rel="stylesheet" href="../css/style.css"><link rel="stylesheet" href="../css/admin.css"></head><body><header><div class="logo">PromoFinder Admin</div><nav><a href="dashboard.html">Dashboard</a><a class="active" href="produtos.html">Produtos</a><a href="usuarios.html">Usuários</a><a href="relatorios.html">Relatórios</a><a class="preview-link" href="../index.html">Ver site</a><a href="#" id="adminLogout">Sair</a></nav></header><main class="admin-shell"><div class="admin-top"><h1>Gerenciar Produtos</h1><a class="btn preview-link" href="../index.html">Ver index / conferir alterações</a></div><div id="formStatus" class="status">Cadastre ou edite produtos sem alterar a estrutura do banco.</div><section class="card"><form id="produtoForm"><input type="hidden" id="produtoId"><div class="form-row"><input id="title" placeholder="Título do produto" required><input id="brand" placeholder="Marca"></div><div class="form-row"><input id="price" type="number" step="0.01" min="0" placeholder="Preço" required><input id="oldPrice" type="number" step="0.01" min="0" placeholder="Preço antigo"></div><input id="image" placeholder="URL da imagem"><textarea id="description" rows="3" placeholder="Descrição"></textarea><textarea id="specs" rows="3" placeholder="Especificações, uma por linha"></textarea><div class="admin-actions"><button type="submit" id="saveBtn">Salvar Produto</button><button type="button" id="cancelBtn" class="btn-secondary">Cancelar edição</button></div></form></section><section class="card" style="margin-top:22px"><div class="toolbar"><h2>Lista de Produtos</h2><input id="adminSearch" class="search" placeholder="Buscar na lista..."></div><div class="table-wrap"><table><thead><tr><th>ID</th><th>Produto</th><th>Marca</th><th>Preço</th><th>Ações</th></tr></thead><tbody id="produtosTbody"></tbody></table></div></section></main><script src="../js/admin.js"></script></body></html>
