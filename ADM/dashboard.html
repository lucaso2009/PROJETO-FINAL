<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Dashboard Admin</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .admin-list{ max-width:1000px; margin:20px auto; display:grid; gap:12px }
        .admin-box{ background:var(--surface); padding:12px; border-radius:8px; display:flex; justify-content:space-between; align-items:center }
        .admin-box h3{ margin:0 }
        .admin-actions button{ margin-left:8px }
        .admin-toolbar{ max-width:1000px; margin:10px auto; display:flex; justify-content:space-between; align-items:center }
        .modal-admin{ position:fixed; inset:0; display:none; align-items:center; justify-content:center; z-index:60 }
        .modal-admin .card{ width:560px }
    </style>
<header>

    <h1>Painel Administrativo</h1>

</header>

<main class="dashboard">

    <div class="box">

        <h2>Usuários</h2>

        <span id="countUsers">—</span>

    </div>

    <div class="box">

        <h2>Produtos</h2>

        <span id="countProducts">—</span>

    </div>

    <div class="box">

        <h2>Promoções</h2>

        <span id="countPromos">—</span>

    </div>

</main>

<section class="admin-list" id="adminList">
    <!-- lista dinâmica -->
</section>

<div id="produtoModal" class="modal-admin">
    <div class="card">
        <h3 id="modalTitle">Cadastrar Produto</h3>
        <form id="produtoForm">
            <div id="produtoError" style="color:#b91c1c;margin-bottom:8px;display:none"></div>
            <input name="title" placeholder="Título" required />
            <input name="brand" placeholder="Marca" />
            <input name="price" placeholder="Preço" type="number" step="0.01" min="0" required />
            <input name="oldPrice" placeholder="Preço antigo" type="number" step="0.01" min="0" />
            <input name="image" placeholder="URL imagem" />
            <div style="display:flex;gap:8px;margin-top:8px">
                <button type="submit" class="btn btn-primary">Salvar</button>
                <button type="button" id="cancelProduto" class="btn btn-secondary">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<div class="admin-toolbar">
    <div></div>
    <div><button id="btnNovo" class="btn btn-primary">Novo Produto</button></div>
</div>

<script>
async function loadAdminData(){
    try{
        const p = await fetch('/api/products').then(r=>r.json());
        const u = await fetch('/api/users').then(r=>r.json());
        document.getElementById('countProducts').textContent = p.length;
        document.getElementById('countUsers').textContent = u.length;
        document.getElementById('countPromos').textContent = p.filter(x=>x.oldPrice && Number(x.oldPrice) > Number(x.price)).length;

        const list = document.getElementById('adminList');
        list.innerHTML = '';
        p.slice(0,50).forEach(pr => {
            const div = document.createElement('div');
            div.className = 'admin-box';
            div.innerHTML = `<div><h3>${pr.title}</h3><div style="color:var(--muted)">${pr.brand}</div></div><div>R$ ${Number(pr.price).toFixed(2).replace('.',',')}
                <div class="admin-actions">
                    <button data-id="${pr.id}" class="btn btn-secondary btn-edit">Editar</button>
                    <button data-id="${pr.id}" class="btn btn-secondary btn-delete">Excluir</button>
                </div>
            </div>`;
            list.appendChild(div);
        });
    }catch(e){ console.error(e) }
}
loadAdminData();

// comportamentos CRUD
document.addEventListener('DOMContentLoaded', ()=>{
    const modal = document.getElementById('produtoModal');
    const form = document.getElementById('produtoForm');
    const btnNovo = document.getElementById('btnNovo');
    const cancel = document.getElementById('cancelProduto');
    let editingId = null;

    function openModal(){ modal.style.display = 'flex'; }
    function closeModal(){ modal.style.display = 'none'; form.reset(); editingId = null; document.getElementById('modalTitle').textContent = 'Cadastrar Produto'; }

    btnNovo.addEventListener('click', ()=>{ openModal(); });
    cancel.addEventListener('click', ()=> closeModal());

    // delegação para editar/excluir
    document.getElementById('adminList').addEventListener('click', async (e)=>{
        if (e.target.matches('.btn-edit')){
            const id = e.target.getAttribute('data-id');
            const res = await fetch('/api/products');
            const products = await res.json();
            const prod = products.find(p=>String(p.id)===String(id));
            if (!prod) return alert('Produto não encontrado');
            // preencher form
            form.title.value = prod.title || '';
            form.brand.value = prod.brand || '';
            form.price.value = prod.price || '';
            form.oldPrice.value = prod.oldPrice || '';
            form.image.value = prod.image || '';
            editingId = id;
            document.getElementById('modalTitle').textContent = 'Editar Produto';
            openModal();
        }
        if (e.target.matches('.btn-delete')){
            const id = e.target.getAttribute('data-id');
            if (!confirm('Confirma excluir este produto?')) return;
            await fetch('/api/products/'+id, { method:'DELETE' });
            await loadAdminData();
        }
    });

    form.addEventListener('submit', async (ev)=>{
        ev.preventDefault();
        const errorEl = document.getElementById('produtoError');
        errorEl.style.display = 'none';
        errorEl.textContent = '';

        const title = (form.title.value || '').trim();
        const priceVal = form.price.value;
        const price = priceVal === '' ? NaN : parseFloat(priceVal);
        const oldVal = form.oldPrice.value;
        const oldPrice = oldVal === '' ? null : parseFloat(oldVal);
        const brand = (form.brand.value || '').trim();
        const image = (form.image.value || '').trim();

        // Regras avançadas
        if (!title) {
            errorEl.textContent = 'O título é obrigatório.';
            errorEl.style.display = 'block';
            form.title.focus();
            return;
        }
        if (title.length < 3 || title.length > 150) {
            errorEl.textContent = 'O título deve ter entre 3 e 150 caracteres.';
            errorEl.style.display = 'block';
            form.title.focus();
            return;
        }

        if (brand.length > 60) {
            errorEl.textContent = 'Marca muito longa (máx. 60 caracteres).';
            errorEl.style.display = 'block';
            form.brand.focus();
            return;
        }

        if (isNaN(price) || price < 0) {
            errorEl.textContent = 'Informe um preço válido (número maior ou igual a 0).';
            errorEl.style.display = 'block';
            form.price.focus();
            return;
        }
        if (price > 1000000) {
            errorEl.textContent = 'Preço muito alto.';
            errorEl.style.display = 'block';
            form.price.focus();
            return;
        }

        if (oldPrice !== null && (isNaN(oldPrice) || oldPrice < 0)){
            errorEl.textContent = 'Informe um preço antigo válido ou deixe em branco.';
            errorEl.style.display = 'block';
            form.oldPrice.focus();
            return;
        }
        if (oldPrice !== null && oldPrice < price){
            errorEl.textContent = 'Preço antigo deve ser maior ou igual ao preço atual.';
            errorEl.style.display = 'block';
            form.oldPrice.focus();
            return;
        }

        // validação simples de URL
        if (image) {
            try{
                const u = new URL(image);
                if (!(u.protocol === 'http:' || u.protocol === 'https:')) throw new Error('Protocolo inválido');
            }catch(_){
                errorEl.textContent = 'URL de imagem inválida. Use http(s)://... ou deixe em branco.';
                errorEl.style.display = 'block';
                form.image.focus();
                return;
            }
        }

        const payload = {
            title: title,
            brand: brand,
            price: price,
            oldPrice: oldPrice,
            image: image || null
        };

        if (editingId){
            await fetch('/api/products/'+editingId, { method:'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
        } else {
            await fetch('/api/products', { method:'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
        }
        closeModal();
        await loadAdminData();
    });
});
</script>

</body>

</html>
