<!DOCTYPE html>
<html lang="pt-BR">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>PromoFinder - Perfil</title>
	<link rel="stylesheet" href="css/style.css">
</head>

<body>

	<header>

		<div class="logo">PromoFinder</div>

		<nav>
			<a href="index.html">Início</a>
			<a href="produto.html">Produtos</a>
			<a href="#" id="logoutLink">Sair</a>
		</nav>

	</header>

	<div class="container">

		<div class="perfil-card">

			<h2>Minha Conta</h2>

			<form id="perfilForm" class="card">
				<label>Nome</label>
				<input id="perfil_nome" type="text" placeholder="Nome completo">

				<label>E-mail</label>
				<input id="perfil_email" type="email" placeholder="E-mail">

				<label>Telefone</label>
				<input id="perfil_telefone" type="text" placeholder="(99) 99999-9999">

				<label>Endereço</label>
				<textarea id="perfil_endereco" rows="3" placeholder="Endereço completo"></textarea>

				<button id="perfil_salvar" class="btn-primary">Salvar alterações</button>
			</form>

			<div style="margin-top:18px">
				<h3>Alterar Senha</h3>
				<input id="perfil_curPwd" type="password" placeholder="Senha atual">
				<input id="perfil_newPwd" type="password" placeholder="Nova senha">
				<input id="perfil_newPwd2" type="password" placeholder="Confirmar nova senha">
				<button id="perfil_changePwd" class="btn">Alterar senha</button>
			</div>

			<div style="margin-top:18px">
				<h3>Endereços</h3>
				<div id="perfil_enderecos_list"></div>
				<div style="margin-top:8px; display:flex; gap:8px; align-items:center">
					<input id="perfil_endereco_novo" placeholder="Novo endereço (rua, nº, cidade)" style="flex:1" />
					<button id="perfil_addEndereco" class="btn-secondary">Adicionar</button>
				</div>
			</div>

			<div style="margin-top:18px">
				<h3>Métodos de Pagamento</h3>
				<div id="perfil_pagamentos_list"></div>
				<div style="margin-top:8px; display:flex; gap:8px; align-items:center">
					<select id="perfil_pagamento_tipo" style="width:180px">
						<option value="card">Cartão</option>
						<option value="boleto">Boleto</option>
						<option value="pix">PIX</option>
					</select>
					<input id="perfil_pagamento_label" placeholder="Apelido (ex: Visa +1234)" style="flex:1" />
					<button id="perfil_addPagamento" class="btn-secondary">Adicionar</button>
				</div>
			</div>

			<div style="margin-top:18px">
				<h3>Meus Pedidos</h3>
				<div id="perfil_pedidos"></div>
			</div>

		</div>

	</div>

	<script src="js/login.js"></script>
	<script src="js/perfil.js"></script>

</body>

</html>
