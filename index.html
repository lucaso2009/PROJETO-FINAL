<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromoFinder - Produto</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>


    <header>

        <div class="logo">
            PromoFinder
        </div>

        <nav>
            <a href="index.html">Início</a>
            <a href="perfil.html">Minha Conta</a>
            <a href="carrinho.html">Carrinho</a>
                <a href="#" id="logoutLink">Sair</a>
        </nav>

    </header>

    <div class="container">
        <h1 style="margin-bottom:18px">Promoções</h1>

        <div id="productGrid" class="grid-produtos">
            <!-- produtos serão carregados via JS -->
        </div>

    </div>

    <footer>

        <strong>PromoFinder</strong>

        <p>
            Plataforma de comparação de preços e monitoramento de ofertas.
        </p>

        <p>
            © 2026 PromoFinder. Todos os direitos reservados.
        </p>

    </footer>
    <!-- Overlay e Modal de Login -->
    <div id="overlay" class="overlay"></div>

    <div id="loginModal" class="modal">
        <div class="modal-card">
            <h2>Entrar</h2>
            <form id="loginForm" class="modal-form">
                <input type="email" id="email" placeholder="E-mail" required>
                <input type="password" id="senha" placeholder="Senha" required>
                <button type="submit">Entrar</button>
            </form>
            <p>Não possui conta? <a href="#" id="abrirCadastro">Cadastrar</a></p>
        </div>
    </div>

    <!-- Modal de Cadastro -->
    <div id="cadastroModal" class="modal">
        <div class="modal-card">
            <h2>Cadastrar</h2>
            <form id="cadastroForm" class="modal-form">
                <input type="text" id="cad_nome" name="nome" placeholder="Nome completo" required>
                <input type="email" id="cad_email" name="email" placeholder="E-mail" required>
                <input type="password" id="cad_senha" name="senha" placeholder="Senha" required>
                <button type="submit">Cadastrar</button>
            </form>
            <p>Já possui conta? <a href="#" id="voltarLogin">Entrar</a></p>
        </div>
    </div>

    <!-- Modal de Informação do Item -->
    <div id="infoOverlay" class="overlay"></div>
    <div id="infoModal" class="modal">
        <div class="modal-card">
            <h3 id="infoTitle">Detalhes do Produto</h3>
            <div id="infoContent"></div>
            <div style="display:flex; gap:8px; margin-top:12px; justify-content:flex-end">
                <button id="infoClose" class="btn-secondary">Fechar</button>
            </div>
        </div>
    </div>

    <script src="js/produtos.js"></script>
    <script src="js/login.js"></script>
    <script src="js/cadastro.js"></script>
</body>

</html>
