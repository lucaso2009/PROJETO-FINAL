<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromoFinder - Carrinho</title>
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

    <div class="logo">
        PromoFinder
    </div>

    <nav>
        <a href="index.html">Início</a>
        <a href="produto.html">Produtos</a>
        <a href="perfil.html">Minha Conta</a>
        <a href="#" id="logoutLink">Sair</a>
    </nav>

</header>

<div class="container">

    <h1 class="titulo">
        Carrinho de Compras
    </h1>

    <div class="carrinho">

        <div class="itens">

            <div class="item">

                <img src="https://picsum.photos/200?1">

                <div class="info">

                    <h3>Notebook Gamer Acer Nitro</h3>

                    <p class="preco">
                        R$ 4.299,90
                    </p>

                </div>

                <input
                    class="quantidade"
                    type="number"
                    value="1"
                    min="1">

                <div class="acoes">
                    <button class="ver-pedido btn-secondary">Ver Pedido</button>
                    <button class="remover btn">Remover</button>
                </div>

            </div>

            <div class="item">

                <img src="https://picsum.photos/200?2">

                <div class="info">

                    <h3>Headset Gamer HyperX</h3>

                    <p class="preco">
                        R$ 249,90
                    </p>

                </div>

                <input
                    class="quantidade"
                    type="number"
                    value="1"
                    min="1">

                <button class="remover">
                    Remover
                </button>

            </div>

        </div>

        <div class="resumo">

            <h2>Resumo do Pedido</h2>

            <div class="linha">
                <span>Produtos</span>
                <span>R$ 4.549,80</span>
            </div>

            <div class="linha">
                <span>Frete</span>
                <span>Grátis</span>
            </div>

            <div class="linha total">
                <span>Total</span>
                <span>R$ 4.549,80</span>
            </div>

            <button class="btn-finalizar">
                Finalizar Compra
            </button>

        </div>

    </div>

</div>

<!-- Modal de Pedido -->
<div class="overlay" id="pedidoOverlay"></div>
<div class="modal" id="pedidoModal">
    <div class="modal-card">
        <h3>Detalhes do Pedido</h3>
        <div id="pedidoContent">
            <!-- preenchido por JS -->
        </div>
        <div style="display:flex; gap:8px; margin-top:12px">
            <button id="fecharPedido" class="btn-secondary">Fechar</button>
            <button id="confirmarCompra" class="btn-primary">Confirmar Compra</button>
        </div>
    </div>
    </div>

        </div>

    </div>

</div>

<footer>

    <p>
        © 2026 PromoFinder. Todos os direitos reservados.
    </p>

</footer>

<script src="js/login.js"></script>
<script src="js/carrinho.js"></script>

</body>

</html>
