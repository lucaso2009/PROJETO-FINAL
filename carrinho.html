<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Carrinho - PromoFinder</title><link rel="stylesheet" href="css/style.css"></head><body>
<header><div class="logo">PromoFinder</div><nav><a href="index.html">Início</a><a href="produto.html">Produtos</a><a href="perfil.html">Minha Conta</a><a class="active" href="carrinho.html">Carrinho</a><a href="#" id="logoutLink">Entrar</a></nav></header>
<main class="container"><h1>Carrinho de Compras</h1><div class="carrinho"><section class="itens" id="cartItems"></section><aside class="resumo"><h2>Resumo do Pedido</h2><div class="linha"><span>Produtos</span><span id="subtotal">R$ 0,00</span></div><div class="linha"><span>Frete</span><span>Grátis</span></div><div class="linha total"><span>Total</span><span id="total">R$ 0,00</span></div><button id="btnFinalizar" class="btn-finalizar">Finalizar Compra</button><button id="btnLimpar" class="btn-secondary" style="width:100%;margin-top:10px">Limpar Carrinho</button></aside></div></main>

<script src="js/login.js"></script><script src="js/carrinho.js"></script></body></html>
