<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>PromoFinder - Cadastro</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container-login">

        <div class="card">

            <h1>PromoFinder</h1>

            <h2>Criar Conta</h2>

            <form id="cadastroForm">

                <input
                    type="text"
                    id="nome"
                    name="nome"
                    placeholder="Nome completo"
                    required>

                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="E-mail"
                    required>

                <input
                    type="password"
                    id="senha"
                    name="senha"
                    placeholder="Senha"
                    required>

                <button type="submit">
                    Cadastrar
                </button>

            </form>

            <p>
                Já possui conta?
                <a href="login.html">Entrar</a>
            </p>

        </div>

    </div>

    <script src="js/cadastro.js"></script>

</body>

</html>
