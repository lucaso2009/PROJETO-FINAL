<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>PromoFinder - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container-login">

        <div class="card">

            <h1>PromoFinder</h1>

            <h2>Entrar</h2>

            <form id="loginForm">

                <input
                    type="email"
                    id="email"
                    placeholder="E-mail"
                    required>

                <input
                    type="password"
                    id="senha"
                    placeholder="Senha"
                    required>

                <button type="submit">
                    Entrar
                </button>

            </form>

            <p>
                Não possui conta?
                <a href="cadastro.html">Cadastrar</a>
            </p>

        </div>

    </div>

    <script src="js/login.js"></script>


</body>

</html>
